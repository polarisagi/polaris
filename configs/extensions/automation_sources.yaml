# 自动化模板来源配置
# 格式说明：
#   id          - 来源唯一标识（"publisher/name"）
#   name        - 展示名称
#   type        - local（本地文件）| remote（HTTP index.json）
#   path        - type=local 时的本地目录路径（相对于二进制工作目录）
#   url         - type=remote 时的 index.json URL
#   description - 简短说明
#   enabled     - true/false
#   trust_tier  - 1=官方 2=受信第三方 3=社区（仅展示，不影响沙箱）

- id: polaris/builtin
  name: Polaris 内置模板
  type: local
  path: automations/templates
  description: Polaris 随版本附带的内置自动化模板，覆盖日常开发常见场景
  enabled: true
  trust_tier: 1

# 以下为社区/第三方远程源示例，默认禁用
