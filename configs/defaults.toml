# polaris default configuration
# Tier: 0 (8GB RAM) - all remote API, no local model

[system]
tier = 0
max_agents = 3
go_memlimit_mb = 150
data_dir = "~/.polarisagi/polaris"
data_encryption_key = "" # 留空或配置外部 KMS，不要硬编码明文密钥
egress_allowed_domains = [] # 出站域名白名单（仅开启网络隔离时生效，空 = 允许所有）

[system.resource_governor]
# 资源控制阈值，低于指定阈值时触发对应降级保护
mem_l1_free_mb = 2048 # L1 警告：停止拉起新 Agent
mem_l2_free_mb = 1024 # L2 阻塞：挂起所有后台任务
mem_l3_free_mb = 512  # L3 濒死：强杀耗存最大的子进程
cpu_l1_pct = 80.0     # CPU 阈值：降低后台任务优先级
cpu_l2_pct = 95.0     # CPU 阈值：限制并发请求

# 运行时目录布局（从 data_dir 自动派生，无需手动设置）：
#   data_dir/data/        — 数据库文件（polaris.db, surreal.db）
#   data_dir/logs/        — 日志文件
#   data_dir/config/      — Operator 配置覆盖 + 用户 prompts
#   data_dir/extensions/  — 已安装插件（含内嵌 MCP 服务）
#   data_dir/skills/      — 用户技能脚本 / Wasm
#   data_dir/models/      — AI 模型文件（SenseVoice 等）
#   data_dir/workspace/   — Agent 任务沙箱 VFS（每任务一子目录）
#   data_dir/sessions/    — 会话 transcript 归档
#   data_dir/audit/       — 审计档案
#   data_dir/reports/     — 月度成本报告
#   data_dir/cache/       — HTTP / 推理缓存
#   data_dir/hooks/       — 用户事件 Hook 脚本
#   data_dir/tmp/         — Marketplace 下载暂存
#
# 以下四个目录可独立挂载到其他磁盘/分区（空字符串 = 使用默认派生路径）：
[system.dirs]
logs_dir      = ""   # 示例："/var/log/polarisagi" — 中央日志盘
db_dir        = ""   # 示例："/mnt/nvme/polarisagi/data" — 高速 NVMe
workspace_dir = ""   # 示例："/tmp/polarisagi/workspace" — tmpfs 沙箱
models_dir    = ""   # 示例："/mnt/data/models" — 大容量模型盘
bin_dir       = ""   # 示例："/opt/polarisagi/bin" — 二进制依赖存放目录

# ── 下载配置 ────────────────────────────────────────────────────────────────
[download]
# GitHub 下载代理（仅中国大陆有意义；海外用户 auto 模式会自动跳过代理）
# "auto"                          → 自动探测：500ms 内可达 github.com 则直连（海外/VPN），
#                                   否则判定为中国大陆网络，按优先级切换镜像（默认）
# "off"                           → 始终直连，禁用代理
# "https://ghproxy.net"           → 强制使用主镜像（中国区推荐）
# "https://mirror.ghproxy.com"    → 强制使用备用镜像
# auto 模式下降级顺序：ghproxy.net → mirror.ghproxy.com → 直连
# 亦可通过环境变量设置（优先级更高）：export POLARIS_GITHUB_PROXY=https://ghproxy.net
github_proxy = "auto"

[inference]
default_provider = "deepseek-v4-flash"
reasoning_provider = "deepseek-v4-pro"
structured_output = "grammar"
# 嵌入向量维度（须与实际嵌入模型一致，同时决定 SurrealDB HNSW DIMENSION）。
# 用户如果在下方 [embedding] 配置了外部大模型，此值必须与模型输出维度对应（如 OpenAI/DeepSeek 均为 1536）。
# 只有在用户未配置外部 API，且 FeatureGate 根据内存自动启用了本地 Ollama 时，此值才会被自动覆盖，无需手动修改：
#   FeatureMaxEmbedding  （Tier2, ≥12GB free）→ qwen3-embedding:8b   → 4096  MTEB 70.58
#   FeatureUltraEmbedding（Tier1, ≥6GB  free）→ qwen3-embedding:4b   → 2560  MTEB ~68
#   FeatureHQEmbedding   （Tier0, ≥3GB  free）→ qwen3-embedding:0.6b → 1024  MTEB 64.33
#   FeatureLocalEmbedding（Tier0, ≥256MB    ）→ nomic-embed-text     →  768  MTEB ~62
# 远程 API 默认路径：
#   OpenAI text-embedding-3-small / DeepSeek-Embedder → 1536
embedder_dim = 1536

[inference.cache]
enabled = true
backend = "pebble"

# STT 模型由 FeatureGate 按可用内存自动选择档位，无需手动修改：
#   FeatureHQSTT  （Tier0, ≥1GB  free）→ float32 SenseVoice（~170MB）→ sense_voice_model_url
#   FeatureLocalSTT（Tier0, ≥512MB free）→ int8    SenseVoice（~87MB） → sense_voice_model_url_std
#   < 512MB free   → STT 禁用
# 两档均支持 zh/en/ja/ko/yue 多语种，通过 PunctModel 加标点。
[inference.stt]
sherpa_version = "1.13.2"
# HQ 档：float32 SenseVoice，精度更高（FeatureHQSTT ≥1GB 时自动选择）
sense_voice_model_url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2025-09-09.tar.bz2"
# 标准档：int8 量化 SenseVoice，体积减半（FeatureLocalSTT ≥512MB 时自动选择）
sense_voice_model_url_std = "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2025-09-09-int8.tar.bz2"
punct_model_url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/punctuation-models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12.tar.bz2"

# ── TTS 配置 ────────────────────────────────────────────────────────────────
# provider 三选一：
#   ""/"sherpa" - 本地 sherpa-onnx Kokoro 模型（离线，≥512MB 门控）
#   "edge"      - Microsoft Edge TTS WebSocket（免费无密钥，中国大陆可用）
#   "http"      - 外部 HTTP sidecar（CosyVoice 2 / Qwen3-TTS 等 GPU 推理）
[inference.tts]
provider = "edge"              # 默认 Edge TTS：免费、无需安装模型、中文质量优秀

# ── edge provider ────────────────────────────────────────────────────────────
edge_voice = "zh-CN-XiaoxiaoNeural"  # 晓晓（女）；可选 zh-CN-YunxiNeural（云希，男）

# ── http provider ────────────────────────────────────────────────────────────
http_endpoint = ""   # 填 "http://127.0.0.1:8000/tts" 启用 CosyVoice 2 / Qwen3-TTS

# ── sherpa provider（本地离线，需下载模型，≥512MB 门控）────────────────────────
sherpa_version = ""  # 留空复用 inference.stt.sherpa_version
model_url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/kokoro-multi-lang-v1_1.tar.bz2"
tokens_url = ""

[storage]
# Tier0 SQLite 内存余弦向量扫描的最大行数上限，防止全表扫描导致 OOM（见 docs/specs/09-LLM-Agent-Production.md A-14）。
# <=0 时代码内回退默认值 500（internal/config/config.go），此处显式声明保持配置可发现性。
tier0_vector_scan_limit = 500

[storage.engines]
relational = "sqlite"
vector = "sqlite-vec"
graph = "loradb"
kv = "pebble"
fulltext = "sqlite-fts5"
eventlog = "wal"

[observability.traces]
enabled = true
sampler = 1.0

[observability.metrics]
enabled = true

[observability.logs]
level = "info"
format = "json"

[agent]
enable_fsm_chat_path = true

[agent.kernel]
state_machine = "dual_route"
default_surprise_threshold = 0.5

[agent.memory]
layers = ["working", "episodic", "semantic", "procedural"]
consolidation = "manual"

[agent.skill]
builtin_path = "skills/"
max_logic_collapse_concurrent = 1
web_search_engine = "duckduckgo"
web_search_api_key = ""

[orchestrator]
mode = "blackboard"
protocol = "structured_event"

[self_improve]
gradient = false
auto_curriculum = false

[self_improve.logic_collapse]
enabled = true
min_success_for_trigger = 50

[knowledge.rag]
mode = "hybrid"
graphrag = "microsoft"

[policy]
engine = "cedar"
default_block = true
# Cedar 裁决生效模式："shadow"（默认，仅记录不裁决）/ "deny"（Cedar 明确拒绝强制生效，Go 规则仅兜底 allow）/
# "full"（完全生效）。Cedar 实体存储尚未完整实现前，"deny" 是推荐的生产配置——既杜绝 Cedar 拒绝被静默旁路，
# 又不会因实体存储不完整而误伤合法 allow 请求。
cedar_enforce_mode = "shadow"
# Cedar 策略文件路径覆盖（空 = 使用二进制内置 embed 默认策略，无需修改）。
# 运营商如需自定义策略，将 Cedar 文件放到指定路径后重启进程即可，无需重新编译。
# 示例：hard_constraints_path = "/etc/polaris/policy/hard_constraints.cedar"
hard_constraints_path = ""
soft_constraints_path = ""

[eval]
ci_gate = true
shadow_deploy = false

[interface]
host = "127.0.0.1"
port = 28888
cli = true
http = true
grpc = false
websocket = false

[security]
# Tier 3（≥64GB）本地大模型专用的出站网络彻底隔离模式：为真时启用 NetworkSandbox
# （loopback-only + LocalProvider 内存预算守卫），fail-closed，任一环节失败阻止启动。
# 见 docs/arch/M11-Policy-Safety.md §5 local_only 模式。Tier 0/1/2 不应开启（无本地模型）。
local_only_mode = false

[sandbox]
# 是否启用平台原生进程隔离（macOS Seatbelt / Linux bubblewrap / Windows WSL2）。
# false = 仅 env 清理 + workDir，用于调试或受信任环境。
enabled        = true
# 网络访问策略："block"（默认，对齐 Claude Code）或 "allow"。
network_policy = "block"
# Linux bubblewrap 可执行路径，空 = 自动从 PATH 查找。
bwrap_path = ""
# Agent 可访问的额外文件系统路径白名单。
# DataDir（~/.polarisagi/polaris）始终自动包含，无需重复填写。
# 加入后，read_file / list_dir / glob / grep / bash / git_diff 等所有文件工具均可访问该路径。
# 示例（取消注释并按需修改）：
# allowed_paths = ["/home/user/projects", "/tmp"]
allowed_paths = []

[sandbox.remote]
# 远端云沙箱（Sbx-L4）：Tier-0 本地无法启动 L3 容器沙箱或需要更高计算力/隔离度时
# （如 Python 数据科学类 Skill），将工具执行委托给远端 HTTP 执行器（自托管 VPS、
# E2B、Modal、Daytona 等任意兼容端点）。涉及代码/数据离开本机发往第三方服务，
# 默认关闭，需显式配置 endpoint 后启用（[Tier-0-Limit]：可选能力，非硬依赖）。
enabled = false
# 远端执行器根 URL，如 "https://executor.example.com"。enabled=true 时必填。
endpoint = ""
# Bearer 认证令牌。留空则读取 POLARIS_REMOTE_SANDBOX_TOKEN 环境变量（避免密钥明文落盘）。
auth_token = ""
# 单次调用超时秒数。0 = 默认 300s（对应重计算场景）。
timeout_sec = 0

[cognition]
# SurrealDB 认知存储后端（运行时选择，不影响编译）。
# "rocksdb" = kv-rocksdb 持久化（默认），数据落盘 data/surreal.db，RSS ~200MB。
#             系统自动根据内存降级：
#               TotalRAM < 2GB  → SurrealDB 完全跳过，cognitive axis → SQLite
#               2GB ≤ RAM < 4GB → 强制降级为 "mem"（进程重启数据丢失）
#               TotalRAM ≥ 4GB  → 使用本配置值（默认 "rocksdb"，持久化）
# "mem"     = kv-mem 进程内存，重启丢失，可手动设置强制 mem 模式（如低配 VPS）。
surreal_backend = "rocksdb"
surreal_db_path = ""
# Tokio 运行时工作线程数（影响 SurrealDB 并发写入吞吐与内存占用）。
# 0  = auto（min(CPU 核心数, 4)）—— ≥8GB 机器自动选择。
# 2  = 4GB 内存机器推荐，节省约 30-50MB RSS。
surreal_worker_threads = 2

[compressor]
# 模型上下文窗口大小（token 数）。自动压缩阈值 = context_window × auto_compact_pct / 100。
# Tier-0 默认 32768（DeepSeek V3 实际窗口远大于此，可按需调高）。
context_window   = 32768
# 自动压缩触发百分比，对齐 Claude Code 默认值 95%。
auto_compact_pct = 95.0
# 上下文使用率警告触发百分比（黄色 Banner 提示用户）。
warn_pct         = 80.0
# 连续自动压缩但仍超阈值的最大次数；超出后停止自动压缩并显示抖动告警。
max_thrash_count = 3

# ── 向量化服务（Tier 2 Ambient 匹配 + Extension Catalog 预计算）─────────────────
# 系统完全遵循“用户配置优先”。只要配置了 base_url，即强制使用该远程模型，绝不会自动拉取本地模型。
# 只有在 base_url 留空时，系统才可能根据可用内存在后台尝试启动本地 Ollama 作为回退（Fallback）。
# 若本地模型也不可用，所有检索将优雅降级到 Tier 1（基于关键词的 FTS 搜索）。
#
# 提示：首次配置好下方的大模型后，可在系统中触发市场同步（local_only），即可将历史缺少的插件向量全部补齐。
# 示例: base_url = "https://api.deepseek.com/v1", model = "deepseek-embed"
[embedding]
base_url  = ""
model     = ""
# api_key 留空时读 POLARIS_EMBEDDING_API_KEY 环境变量
api_key   = ""
# 余弦相似度阈值，低于此值的技能/扩展不注入
similarity_threshold = 0.60
