name: Benchmark — M1 Provider Routing

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to benchmark (empty = all)"
        required: false
        default: ""
  schedule:
    # 每月 1 日 06:00 UTC 自动执行
    - cron: "0 6 1 * *"

jobs:
  routing-benchmark:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install promptfoo
        run: npm install -g promptfoo@latest

      - name: Run routing benchmark
        run: make benchmark-routing

      - name: Archive benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: /tmp/polaris-benchmark-results.json
          retention-days: 90
