name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build UI
        run: make build-ui

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # Rust 预编译：6 个 target 全部并行，产物通过 artifact 传递给下游 Go 编译
  # 最终产物缓存（跨 Tag 支持）：利用 GitHub CLI 下载上一次成功发布时的产物比对 Hash，实现跨 Tag 秒级跳过
  build-rust:
    name: Rust (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            cargo_target: aarch64-unknown-linux-gnu
          - name: darwin-arm64
            runner: macos-latest
            cargo_target: aarch64-apple-darwin
          - name: darwin-amd64
            runner: macos-latest
            cargo_target: x86_64-apple-darwin
          - name: windows-amd64
            runner: windows-latest
            cargo_target: x86_64-pc-windows-msvc
          - name: windows-arm64
            runner: windows-latest
            cargo_target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 跨 Tag 缓存核心机制：先下载极小的 Hash Artifact，如果匹配再去下载几十 MB 的真实产物
      - name: Restore Rust from previous release
        id: rust-restore
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          CURRENT_HASH="${{ hashFiles('rust/substrate/src/**', 'rust/substrate/Cargo.toml', 'rust/substrate/Cargo.lock') }}"
          echo "Current hash: $CURRENT_HASH"
          echo "CURRENT_HASH=$CURRENT_HASH" >> $GITHUB_ENV
          
          # 寻找最近一次成功的 Release 流水线
          LATEST_RUN=$(gh run list --workflow=release.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId' || echo "")
          if [ -n "$LATEST_RUN" ]; then
            echo "Found previous successful run: $LATEST_RUN"
            # 先仅仅下载 Hash 文件（几字节），避免盲目下载几十 MB 大文件
            gh run download $LATEST_RUN -n rust-hash-${{ matrix.name }} -D prev_hash || echo "Hash artifact not found"
            
            if [ -f "prev_hash/rust-hash.txt" ]; then
              PREV_HASH=$(cat prev_hash/rust-hash.txt)
              if [ "$PREV_HASH" == "$CURRENT_HASH" ]; then
                echo "Hash matches! Downloading full artifacts..."
                gh run download $LATEST_RUN -n rust-${{ matrix.name }} -D prev_rust || echo "Full artifact not found"
                
                # 检查是否成功下载了动态库
                if ls prev_rust/libsubstrate.* prev_rust/substrate.dll 1> /dev/null 2>&1; then
                  echo "cache-hit=true" >> $GITHUB_OUTPUT
                  mkdir -p rust/substrate/target/${{ matrix.cargo_target }}/release
                  cp prev_rust/* rust/substrate/target/${{ matrix.cargo_target }}/release/ || true
                  exit 0
                fi
              fi
            fi
          fi
          echo "cache-hit=false" >> $GITHUB_OUTPUT

      # ── 以下步骤仅在跨 Tag 缓存未命中时执行 ──

      - name: Disable Windows Defender
        if: steps.rust-restore.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "C:\Users\runneradmin\.cargo"

      - name: Set up Rust
        if: steps.rust-restore.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Build Rust
        if: steps.rust-restore.outputs.cache-hit != 'true'
        shell: bash
        run: cargo build --release --target ${{ matrix.cargo_target }} --manifest-path rust/substrate/Cargo.toml

      # ── 无论缓存是否命中，都准备并上传 artifact 供本流水线的 Go 编译使用，并作为下次发版的基准 ──

      - name: Save Rust Hash for next release
        shell: bash
        run: |
          mkdir -p rust/substrate/target/${{ matrix.cargo_target }}/release
          echo "${{ env.CURRENT_HASH }}" > rust/substrate/target/${{ matrix.cargo_target }}/release/rust-hash.txt

      - name: Upload Rust Hash Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-hash-${{ matrix.name }}
          path: rust/substrate/target/${{ matrix.cargo_target }}/release/rust-hash.txt
          retention-days: 1

      - name: Upload Rust Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.name }}
          path: |
            rust/substrate/target/${{ matrix.cargo_target }}/release/libsubstrate.so
            rust/substrate/target/${{ matrix.cargo_target }}/release/libsubstrate.dylib
            rust/substrate/target/${{ matrix.cargo_target }}/release/substrate.dll
          if-no-files-found: warn
          retention-days: 1

  # Go 交叉编译 + 打包：全部在 ubuntu 上完成（零 CGO，purego 运行时加载）
  # 省掉 macOS / Windows runner 的分配等待和额外工具安装
  build-packages:
    needs: [build-frontend, build-rust]
    name: Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            cargo_target: x86_64-unknown-linux-gnu
            rust_artifact: rust-linux-amd64
            archive_format: tar.gz
            binary_suffix: ""
          - name: linux-arm64
            goos: linux
            goarch: arm64
            cargo_target: aarch64-unknown-linux-gnu
            rust_artifact: rust-linux-arm64
            archive_format: tar.gz
            binary_suffix: ""
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            cargo_target: aarch64-apple-darwin
            rust_artifact: rust-darwin-arm64
            archive_format: tar.gz
            binary_suffix: ""
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            cargo_target: x86_64-apple-darwin
            rust_artifact: rust-darwin-amd64
            archive_format: tar.gz
            binary_suffix: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            cargo_target: x86_64-pc-windows-msvc
            rust_artifact: rust-windows-amd64
            archive_format: zip
            binary_suffix: ".exe"
          - name: windows-arm64
            goos: windows
            goarch: arm64
            cargo_target: aarch64-pc-windows-msvc
            rust_artifact: rust-windows-arm64
            archive_format: zip
            binary_suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Download Rust Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust_artifact }}
          path: rust/substrate/target/${{ matrix.cargo_target }}/release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Backend (cross-compile)
        env:
          CARGO_TARGET: ${{ matrix.cargo_target }}
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SKIP_RUST_BUILD: 1
        run: make build-backend

      - name: Rename binary for Windows
        if: matrix.binary_suffix == '.exe'
        run: mv bin/polaris bin/polaris.exe

      - name: Package
        run: |
          ARCHIVE_NAME="polaris-${{ matrix.name }}"
          mkdir -p release_pkg
          cp -r bin/* release_pkg/
          cp -r configs release_pkg/
          cp -r policies release_pkg/
          cp LICENSE release_pkg/
          cd release_pkg
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            zip -r "../${ARCHIVE_NAME}.zip" ./*
          else
            tar -czvf "../${ARCHIVE_NAME}.tar.gz" ./*
          fi
          cd ..
          sha256sum ${ARCHIVE_NAME}.* > ${ARCHIVE_NAME}.${{ matrix.archive_format }}.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-${{ matrix.name }}
          path: polaris-${{ matrix.name }}.*
          retention-days: 1

  publish:
    needs: [build-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: polaris-*
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
