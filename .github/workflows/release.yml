name: Release

# ═══════════════════════════════════════════════════════════════════════
# 优化摘要（对比旧版）
#
# 旧流程关键路径：
#   build-frontend (3min)
#     → build-go [6×ubuntu, 并行] (~4min)
#       → build-rust [6×各平台, 串行等待 Go] (~20min macOS/Win)
#         → package → publish
#   总计 ~30min；macOS 占 2 个 runner
#
# 新流程关键路径：
#   prepare (30s) ─┐
#   build-frontend ─┤ 并行
#   build-go ───────┘
#     → package (下载预编译 Rust, ~30s) → publish
#   总计 ~8-10min；零 Rust 编译开销
#
# 优化点一览：
#   ① Rust 完全剥离 — 产物存 GitHub pre-release（rust-build.yml 维护）
#   ② prepare job 与 build-frontend 并行，提前拿到 Rust hash
#   ③ build-go 全部 ubuntu-latest 纯交叉编译，Go module cache 命中极快
#   ④ 并发控制：同一 tag 只允许一个 release 流水线运行
#   ⑤ 找不到预编译产物时 fail-fast 并给出可操作提示
# ═══════════════════════════════════════════════════════════════════════

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

# 同一 tag 只允许一个 release 运行，防止并发写 release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────
  # 0a. ensure-rust：调用 rust-build.yml（可复用工作流）
  #     产物已存在时 ~30s 秒跳过；不存在时自动编译发布。
  #     完全自愈，无需手动触发。
  # ───────────────────────────────────────────────
  ensure-rust:
    name: Ensure Rust Artifacts
    uses: ./.github/workflows/rust-build.yml
    permissions:
      contents: write
    with:
      force_rebuild: false

  # ───────────────────────────────────────────────
  # 0b. prepare：从 ensure-rust 转发 rust_tag / rust_hash
  #     供下游 package job 使用
  # ───────────────────────────────────────────────
  prepare:
    name: Prepare
    needs: ensure-rust
    runs-on: ubuntu-latest
    outputs:
      rust_hash: ${{ needs.ensure-rust.outputs.rust_hash }}
      rust_tag:  ${{ needs.ensure-rust.outputs.rust_tag }}
    steps:
      - name: Echo rust tag
        run: |
          echo "rust_tag=${{ needs.ensure-rust.outputs.rust_tag }}"
          echo "rust_hash=${{ needs.ensure-rust.outputs.rust_hash }}"

  # ───────────────────────────────────────────────
  # 1. 构建前端
  # ───────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build UI
        run: make build-ui

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # ───────────────────────────────────────────────
  # 2. 交叉编译 Go 二进制（全部在 ubuntu-latest，CGO=0）
  #    与 prepare 并行，等 frontend 完成后即启动
  # ───────────────────────────────────────────────
  build-go:
    name: Build Go (${{ matrix.name }})
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true   # 任一平台失败立即取消其余，避免浪费
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            cargo_target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            goos: linux
            goarch: arm64
            cargo_target: aarch64-unknown-linux-gnu
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            cargo_target: aarch64-apple-darwin
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            cargo_target: x86_64-apple-darwin
          - name: windows-amd64
            goos: windows
            goarch: amd64
            cargo_target: x86_64-pc-windows-msvc
            binary_suffix: ".exe"
          - name: windows-arm64
            goos: windows
            goarch: arm64
            cargo_target: aarch64-pc-windows-msvc
            binary_suffix: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true          # 缓存 GOPATH/pkg/mod 和 ~/.cache/go-build

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Build Go binary (cross-compile)
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CARGO_TARGET: ${{ matrix.cargo_target }}
          SKIP_RUST_BUILD: 1
          VERSION: ${{ github.ref_name }}
        run: make build-backend

      - name: Rename binary (Windows)
        if: matrix.binary_suffix == '.exe'
        run: mv bin/polaris bin/polaris.exe

      - uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.name }}
          path: bin/polaris${{ matrix.binary_suffix }}
          retention-days: 1

  # ───────────────────────────────────────────────
  # 3. 打包发布（依赖 build-go + prepare）
  #    Rust 产物直接从 pre-release 下载，无编译开销
  # ───────────────────────────────────────────────
  package:
    name: Package (${{ matrix.name }})
    needs: [build-go, prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-amd64
            archive_format: tar.gz
            rust_artifact: libsubstrate-linux-amd64.so
            rust_libname:  libsubstrate.so
          - name: linux-arm64
            archive_format: tar.gz
            rust_artifact: libsubstrate-linux-arm64.so
            rust_libname:  libsubstrate.so
          - name: darwin-arm64
            archive_format: tar.gz
            rust_artifact: libsubstrate-darwin-arm64.dylib
            rust_libname:  libsubstrate.dylib
          - name: darwin-amd64
            archive_format: tar.gz
            rust_artifact: libsubstrate-darwin-amd64.dylib
            rust_libname:  libsubstrate.dylib
          - name: windows-amd64
            archive_format: zip
            rust_artifact: substrate-windows-amd64.dll
            rust_libname:  substrate.dll
          - name: windows-arm64
            archive_format: zip
            rust_artifact: substrate-windows-arm64.dll
            rust_libname:  substrate.dll
    steps:
      - uses: actions/checkout@v4

      - name: Download Go binary
        uses: actions/download-artifact@v4
        with:
          name: go-${{ matrix.name }}
          path: bin

      # 从 pre-release 下载对应平台的预编译 Rust .so / .dylib / .dll
      - name: Download prebuilt Rust artifact
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:      ${{ needs.prepare.outputs.rust_tag }}
          ARTIFACT: ${{ matrix.rust_artifact }}
          LIBNAME:  ${{ matrix.rust_libname }}
        run: |
          mkdir -p bin/lib
          gh release download "$TAG" \
            --pattern "$ARTIFACT" \
            --dir bin/lib \
            --clobber
          # 重命名为运行时期望的规范文件名
          if [ "$ARTIFACT" != "$LIBNAME" ]; then
            mv "bin/lib/$ARTIFACT" "bin/lib/$LIBNAME"
          fi

      - name: Package release archive
        run: |
          ARCHIVE_NAME="polaris-${{ matrix.name }}"
          mkdir -p "release_pkg/${ARCHIVE_NAME}"
          cp -r bin/polaris* "release_pkg/${ARCHIVE_NAME}/"   # binary (含 .exe)
          cp -r bin/lib      "release_pkg/${ARCHIVE_NAME}/"   # Rust dylib
          cp -r configs      "release_pkg/${ARCHIVE_NAME}/"
          cp LICENSE         "release_pkg/${ARCHIVE_NAME}/"
          cd release_pkg
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            zip -r "../${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          else
            tar -czvf "../${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          fi
          cd ..
          sha256sum ${ARCHIVE_NAME}.${{ matrix.archive_format }} \
            > ${ARCHIVE_NAME}.${{ matrix.archive_format }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: polaris-${{ matrix.name }}
          path: polaris-${{ matrix.name }}.*
          retention-days: 1

  # ───────────────────────────────────────────────
  # 4. 发布 GitHub Release
  # ───────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: polaris-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
