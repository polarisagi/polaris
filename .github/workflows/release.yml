name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build UI
        run: make build-ui

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # Rust 预编译：6 个 target 全部并行，产物通过 artifact 传递给下游 Go 编译
  # 最终产物缓存：Rust 源码 + 依赖无变化时，跳过整个编译（不装 Rust 工具链）
  build-rust:
    name: Rust (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            cargo_target: aarch64-unknown-linux-gnu
          - name: darwin-arm64
            runner: macos-latest
            cargo_target: aarch64-apple-darwin
          - name: darwin-amd64
            runner: macos-latest
            cargo_target: x86_64-apple-darwin
          - name: windows-amd64
            runner: windows-latest
            cargo_target: x86_64-pc-windows-msvc
          - name: windows-arm64
            runner: windows-latest
            cargo_target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 最终产物缓存：key = Rust 源码 + Cargo.toml + Cargo.lock 的 hash
      # 命中时跳过后续所有编译步骤，直接上传 artifact
      - name: Cache Rust final artifact
        id: rust-final
        uses: actions/cache@v4
        with:
          path: |
            rust/substrate/target/${{ matrix.cargo_target }}/release/libsubstrate.so
            rust/substrate/target/${{ matrix.cargo_target }}/release/libsubstrate.dylib
            rust/substrate/target/${{ matrix.cargo_target }}/release/substrate.dll
          key: rust-release-${{ matrix.cargo_target }}-${{ hashFiles('rust/substrate/src/**', 'rust/substrate/Cargo.toml', 'rust/substrate/Cargo.lock') }}

      # ── 以下步骤仅在缓存未命中时执行 ──

      - name: Disable Windows Defender
        if: steps.rust-final.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "C:\Users\runneradmin\.cargo"

      - name: Set up Rust
        if: steps.rust-final.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Set up sccache
        if: steps.rust-final.outputs.cache-hit != 'true'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust Cache
        if: steps.rust-final.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust/substrate"
          cache-on-failure: true
          shared-key: "polaris-${{ matrix.cargo_target }}"
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Build Rust
        if: steps.rust-final.outputs.cache-hit != 'true'
        shell: bash
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.cargo_target }} --manifest-path rust/substrate/Cargo.toml

      - name: Show sccache stats
        if: steps.rust-final.outputs.cache-hit != 'true'
        shell: bash
        run: sccache --show-stats

      # ── 无论缓存是否命中，都上传 artifact 给下游 Go 编译 ──

      - name: Upload Rust Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.name }}
          path: |
            rust/substrate/target/${{ matrix.cargo_target }}/release/libsubstrate.so
            rust/substrate/target/${{ matrix.cargo_target }}/release/libsubstrate.dylib
            rust/substrate/target/${{ matrix.cargo_target }}/release/substrate.dll
          if-no-files-found: warn
          retention-days: 1

  # Go 交叉编译 + 打包：全部在 ubuntu 上完成（零 CGO，purego 运行时加载）
  # 省掉 macOS / Windows runner 的分配等待和额外工具安装
  build-packages:
    needs: [build-frontend, build-rust]
    name: Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            cargo_target: x86_64-unknown-linux-gnu
            rust_artifact: rust-linux-amd64
            archive_format: tar.gz
            binary_suffix: ""
          - name: linux-arm64
            goos: linux
            goarch: arm64
            cargo_target: aarch64-unknown-linux-gnu
            rust_artifact: rust-linux-arm64
            archive_format: tar.gz
            binary_suffix: ""
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            cargo_target: aarch64-apple-darwin
            rust_artifact: rust-darwin-arm64
            archive_format: tar.gz
            binary_suffix: ""
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            cargo_target: x86_64-apple-darwin
            rust_artifact: rust-darwin-amd64
            archive_format: tar.gz
            binary_suffix: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            cargo_target: x86_64-pc-windows-msvc
            rust_artifact: rust-windows-amd64
            archive_format: zip
            binary_suffix: ".exe"
          - name: windows-arm64
            goos: windows
            goarch: arm64
            cargo_target: aarch64-pc-windows-msvc
            rust_artifact: rust-windows-arm64
            archive_format: zip
            binary_suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Download Rust Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust_artifact }}
          path: rust/substrate/target/${{ matrix.cargo_target }}/release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Backend (cross-compile)
        env:
          CARGO_TARGET: ${{ matrix.cargo_target }}
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SKIP_RUST_BUILD: 1
        run: make build-backend

      - name: Rename binary for Windows
        if: matrix.binary_suffix == '.exe'
        run: mv bin/polaris bin/polaris.exe

      - name: Package
        run: |
          ARCHIVE_NAME="polaris-${{ matrix.name }}"
          mkdir -p release_pkg
          cp -r bin/* release_pkg/
          cp -r configs release_pkg/
          cp -r policies release_pkg/
          cp LICENSE release_pkg/
          cd release_pkg
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            zip -r "../${ARCHIVE_NAME}.zip" ./*
          else
            tar -czvf "../${ARCHIVE_NAME}.tar.gz" ./*
          fi
          cd ..
          sha256sum ${ARCHIVE_NAME}.* > ${ARCHIVE_NAME}.${{ matrix.archive_format }}.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-${{ matrix.name }}
          path: polaris-${{ matrix.name }}.*
          retention-days: 1

  publish:
    needs: [build-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
