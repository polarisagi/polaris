name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build UI
        run: make build-ui

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  build:
    needs: build-frontend
    name: Build (${{ matrix.os_name }}-${{ matrix.arch_name }})
    runs-on: ${{ matrix.runner_os }}
    strategy:
      matrix:
        include:
          - os_name: linux
            arch_name: amd64
            runner_os: ubuntu-latest
            cargo_target: 'x86_64-unknown-linux-gnu'
            goarch: amd64
          - os_name: linux
            arch_name: arm64
            runner_os: ubuntu-24.04-arm
            cargo_target: 'aarch64-unknown-linux-gnu'
            goarch: arm64
          - os_name: darwin
            arch_name: arm64
            runner_os: macos-latest
            cargo_target: 'aarch64-apple-darwin'
            goarch: arm64
          - os_name: darwin
            arch_name: amd64
            runner_os: macos-13
            cargo_target: 'x86_64-apple-darwin'
            goarch: amd64
          - os_name: windows
            arch_name: amd64
            runner_os: windows-latest
            cargo_target: 'x86_64-pc-windows-msvc'
            goarch: amd64
          - os_name: windows
            arch_name: arm64
            runner_os: windows-latest
            cargo_target: 'aarch64-pc-windows-msvc'
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "C:\Users\runneradmin\.cargo"
        shell: powershell

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust/substrate"
          cache-on-failure: true

      - name: Build Project Backend
        shell: bash
        env:
          CARGO_TARGET: ${{ matrix.cargo_target }}
          GOARCH: ${{ matrix.goarch }}
        run: make build-backend

      - name: Package
        shell: bash
        run: |
          mkdir -p release_pkg
          cp -r bin/* release_pkg/
          cp -r configs release_pkg/
          cp -r policies release_pkg/
          cp LICENSE release_pkg/

          cd release_pkg
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            7z a -tzip ../polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.zip ./*
            cd ..
            sha256sum polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.zip \
              > polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.zip.sha256
          else
            tar -czvf ../polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.tar.gz ./*
            cd ..
            sha256sum polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.tar.gz \
              > polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.tar.gz.sha256
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: polaris-${{ matrix.os_name }}-${{ matrix.arch_name }}.*
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
