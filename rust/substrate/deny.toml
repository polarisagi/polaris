[advisories]
unmaintained = "all"
yanked = "warn"
ignore = [
    "RUSTSEC-2025-0141",
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "BUSL-1.1",
    "GPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "AGPL-3.0-or-later"
]
