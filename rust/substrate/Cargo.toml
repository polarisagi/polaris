[package]
name = "substrate"
version = "0.1.0"
edition = "2021"
description = "Polaris — Rust performance-critical path (FFI/sidecar)"

[features]
default = []

[dependencies]
# Embedding computation (SIMD)
bytemuck = "1"
# Zero-copy serialization for Go<->Rust vector transfer
capnp = "0.25.3"
cedar-policy = "4.10.0"
surrealdb = { version = "3", features = ["kv-mem", "kv-rocksdb"] }
tokio = { version = "1", features = ["rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }

[lib]
crate-type = ["staticlib", "cdylib"]
