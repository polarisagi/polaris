[package]
name = "substrate"
version = "0.1.1"
edition = "2021"
description = "Polaris — Rust performance-critical path (FFI/sidecar)"

[features]
default = []

[dependencies]
# Embedding computation (SIMD)
bytemuck = "1"
# Zero-copy serialization for Go<->Rust vector transfer
capnp = "0.25.3"
cedar-policy = "4.10.0"
surrealdb = { version = "3", features = ["kv-mem", "kv-rocksdb"] }
tokio = { version = "1", features = ["rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
wasmtime = { version = "45.0.1", features = ["component-model"] }
wasmtime-wasi = "45.0.1"
lazy_static = "1.5.0"
anyhow = "1.0.102"
bytes = "1.11.1"

[lib]
crate-type = ["staticlib", "cdylib"]
