version: 2

project_name: polaris

before:
  hooks:
    - go mod tidy
    - make build-ui

builds:
  - id: polaris
    binary: polaris
    main: ./cmd/polaris
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.CommitHash={{.ShortCommit}}
      - -X main.BuildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    # 命名与 install.sh 脚本中的 ARCHIVE_NAME 对齐：polaris-linux-amd64.tar.gz
    name_template: "polaris-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - configs/defaults.toml
      - configs/agents/**
      - configs/prompts/**
      - configs/automations/**
      - policies/**
      - LICENSE

checksum:
  name_template: "polaris_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: polarisagi
    name: polaris
  name_template: "{{ .Tag }}"
  draft: false
  prerelease: auto
